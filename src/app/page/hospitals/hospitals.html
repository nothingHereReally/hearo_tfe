<div class="
  flex-column
  flex-align-stretch
  gap-pad100-lg
  ">
  <app-header/>




  @if( dataSource().length!=0 ){
    <div class="
      flex-row
      flex-justify-center
      ">
      <div class="
        flex-column
        flex-align-stretch
        gap-pad200-xl
        body-hospitals-page
        ">
        <div class="
          flex-row
          flex-justify-center
          ">
          <div class="
            search-container-hh
            flex-column
            flex-align-strech
            gap-pad100-md
            ">
            <app-input
                [nameInput]="'search_bar'"
                [labelText]="''"
                [placeholderText]="'Hospital name or address ...'"
                [hasSearch]="'search'"
                [(inputValue)]="searchNameOrAddress"
                (outWant2Run)="clickedSearch()"
                />
            <span class="
            font-normal-regular
            font-color-fail
            flex-row
            flex-justify-center
            ">{{ searchWarning() }}</span>
          </div>
        </div>
        <div class="
          flex-column
          flex-align-stretch
          gap-pad100-lg
          ">
          <span class="
            font-bold-title
            font-color-pc1-300
            flex-row
            flex-justify-center
            ">Hospitals</span>
          <app-stats-in-table
              [dataOnTable]="dataSource()"
              />
        </div>
        <div class="
          flex-row
          gap-pad200-xl
          flex-justify-center
          flex-align-center
          ">
          <app-button
              [text]="''"
              [styleButton]="'style-outline'"
              [iconname]="'arrow_left'"
              (outOnClick)="clickedPrevPagination()"
              />
          <span class="
          font-normal-regular
          font-color-sc-100
          ">{{ this.pageCurrentWhat() }}/{{ this.pageTotalWhat() }}</span>
          <app-button
              [text]="''"
              [styleButton]="'style-outline'"
              [iconname]="'arrow_right'"
              (outOnClick)="clickedNextPagination()"
              />
        </div>
        <div class="
        flex-row
        flex-justify-end
        ">
          <app-button
              [text]="'Add'"
              [styleButton]="'style-solid'"
              [iconname]="'plus'"
              (outOnClick)="clickedAdd()"
              />
        </div>
      </div>
    </div>

  }@else{
    <div class="
      flex-column
      flex-align-center
      gap-pad200-md
      ">
      <span class="
        font-normal-title
        font-color-pc1-300
        ">No Hospital Facilities</span>
      <img
          class="human-lost-hospitals"
          src="/background/human_lost.svg"
          alt="human lost image"
          >
    </div>
  }
</div>
