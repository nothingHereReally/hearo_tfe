<div class="container-whole-page">
  <div class="forgot-password-form">
    <div>
      <img src="/logo/hearo_logo.svg" alt="hearo logo">
      <img src="/logo/hearo_word.svg" alt="hearo word">
      <span class="
        font-bold-regular
        font-color-pc1-300
        ">Hearo Team, Forgot Password</span>
    </div>

    <div>
      <span class="
        font-normal-regular
        font-color-pc1-300
        ">Enter your email address to get the reset link.</span>
      <div>
        <app-input
            [nameInput]="'user_email'"
            [(inputValue)]="userEmail().email"
            [iconNameLeft]="'email'"
            [placeholderText]="'Your email'"
            [labelText]="''"
            (outWant2Run)="getResetLinkClicked()"
            />
        <span class="font-color-fail">{{  warningEmail()  }}</span>
        <span class="font-color-success">{{ successEmail() }}</span>
      </div>
    </div>

    <app-button
        [text]="'Get Reset Link'"
        [styleButton]="'style-solid'"
        (outOnClick)="getResetLinkClicked()"
        />

    <div>
      <span class="
        font-normal-regular
        font-color-pc1-300
        ">Remembered it? Go back to</span>
      <app-button
          [text]="'Log in'"
          [styleButton]="'style-outline'"
          [isUnderlined]="'underlined'"
          [linkURL]="'/login'"
          [linkTarget]="'_self'"
          />
    </div>
  </div>
</div>
