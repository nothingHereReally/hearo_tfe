<main class='whole-page'>
  <form class='form-fill-up'>
    <div class='reset-password-logo'>
      <img src="/logo/hearo_logo.svg" alt="hearo logo">
      <img src="/logo/hearo_word.svg" alt="hearo word">
    </div>



    <div class="
      form-reset-pw-2-bottons
      shadown-and-blur
      ">
      <div>
        <span class="
          font-bold-title
          font-color-pc1-300
          ">Reset Password</span>
        @if( successMessage()=='' ){
        <span class="
          font-normal-regular
          font-color-pc1-300
          ">You are about to reset your password</span>
        <app-input
            [nameInput]="'password'"
            [(inputValue)]="resetPassword().password"
            [iconNameLeft]="''"
            [labelText]="'Password'"
            [hasEye]="'eye'"
            (outWant2Run)="clickedResetPassword()"
            />
        <app-input
            [nameInput]="'rtype_password'"
            [(inputValue)]="resetPassword().retype_password"
            [iconNameLeft]="''"
            [labelText]="'Confirm Password'"
            [hasEye]="'eye'"
            (outWant2Run)="clickedResetPassword()"
            />
        @if( 0<passwordWarnings().length ){
        @for(a_pw_warning of passwordWarnings(); track a_pw_warning){
        <span class="
          font-color-fail
          font-normal-regular
          ">{{ a_pw_warning }}</span>
        }}
        }
        <span class="
          font-bold-title
          font-color-success
          ">{{ successMessage() }}</span>
      </div>


      @if( successMessage()=='' ){
      <span>
        <app-button
            [text]="'Reset Password'"
            [styleButton]="'style-solid'"
            (outOnClick)="clickedResetPassword()"
            />
      </span>


      <div>
        <span class="
          font-normal-regular
          font-color-pc1-300
          ">Cancel resetting password, Go Back to</span>
        <app-button
            [text]="'Log in'"
            [styleButton]="'style-outline'"
            [isUnderlined]="'underlined'"
            [linkURL]="'/login'"
            [linkTarget]="'_self'"
            />
      </div>
      }
    </div>
  </form>
</main>
