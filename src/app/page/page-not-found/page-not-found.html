<div class="page-not-found-page">
  <div class="human404-walking">


    <div class="
      flex-row
      flex-wrap-row
      gap-pad100-md
      padding-left-right-pad200-xl
      padding-top-bottom-pad200-xl
      ">
      <img src="/logo/hearo_logo.svg" alt="hearo logo">
      <img src="/logo/hearo_word.svg" alt="hearo word">
    </div>


    <div class="
      flex-column
      gap-pad100-xs
      page-not-found-word-go-home
      ">
      <div class="font-page-not-found">
        <span class="font-color-pc1-300">Page </span>
        <span class="font-color-fail">Not </span>
        <span class="font-color-pc1-300">Found</span>
      </div>
      <span class="fit-content">
        <app-button
            [text]="'Go Home'"
            [styleButton]="'style-solid'"
            [isUnderlined]="'underlined'"
            [iconname]="'home'"
            [linkURL]="'/home/sentence'"
            [linkTarget]="'_self'"
            />
      </span>
    </div>


  </div>
</div>
