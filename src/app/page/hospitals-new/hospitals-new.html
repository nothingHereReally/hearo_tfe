<div class="
  flex-column
  flex-align-stretch
  gap-pad100-lg
  ">
  <app-header/>




  <div class="
    flex-column
    flex-align-strech
    gap-pad300-xs
    padding-left-right-pad100-lg
    padding-top-bottom-pad100-lg
    ">
    <div>
        <app-button
            [text]="'Back'"
            [styleButton]="'style-outline'"
            [iconname]="'arrow_left'"
            (outOnClick)="clickedBack()"
            />
    </div>
    <div class="
      flex-row
      flex-justify-center
      ">
      <div class="
        flex-column
        gap-pad200-xs
        hospital-new-add-form
        ">
        <div class="
          flex-column
          gap-pad100-md
          ">
            <app-input
                [nameInput]="'hospital_name'"
                [(inputValue)]="newHospitalFacility().name"
                [iconNameLeft]="''"
                [labelText]="'Hospital Name'"
                [hasEye]="''"
                (outWant2Run)="clickedAddHospital()"
                />
            <app-input
                [nameInput]="'hospital_street'"
                [(inputValue)]="newHospitalFacility().street"
                [iconNameLeft]="''"
                [labelText]="'Street Address'"
                [hasEye]="''"
                (outWant2Run)="clickedAddHospital()"
                />
            <app-input
                [nameInput]="'hospital_municipality'"
                [(inputValue)]="newHospitalFacility().municipality"
                [iconNameLeft]="''"
                [labelText]="'Municipality'"
                [hasEye]="''"
                (outWant2Run)="clickedAddHospital()"
                />
        </div>
        <div class="
          flex-row
          flex-justify-space-between
          flex-align-center
          ">
            <app-button
                [text]="'Cancel'"
                [styleButton]="'style-outline'"
                [iconname]="''"
                (outOnClick)="clickedBack()"
                />
            <app-button
                [text]="'Add Hospital'"
                [styleButton]="'style-solid'"
                [iconname]="'plus'"
                (outOnClick)="clickedAddHospital()"
                />
        </div>
      </div>
    </div>
  </div>
</div>
