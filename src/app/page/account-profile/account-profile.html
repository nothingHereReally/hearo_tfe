<div class="account-profile-page">
  <app-header/>




  <div class="back-button-padding-left">
    <app-button
        [text]="'Back'"
        [styleButton]="'style-solid'"
        [iconname]="'arrow_left'"
        (outOnClick)="clickedBack()"
        />
  </div>




  <div class="flex-center-horizontal">
    <form class="account-profile-form">
      <div class="
        font-color-pc1-300
        font-bold-title
        flex-center-horizontal
        ">
        Profile
      </div>


      <div class="account-edits">
        <div>
          <img
              src="/user_default_profile.svg"
              alt="Profile Picture"
              class="image-18rem-size"
              >
          <app-button
              [text]="'Upload Photo'"
              [styleButton]="'style-outline'"
              [iconname]="'upload'"
              (outOnClick)="clickedUploadPhoto()"
              />
        </div>


        <div>
          <app-input
              [nameInput]="'fist_name'"
              [(inputValue)]="userInfoEdit().first_name"
              [iconNameLeft]="''"
              [isReadOnly]="readOrWithEdit()"
              [labelText]="'First Name'"
              [placeholderText]="'First Name'"
              (outWant2Run)="clickedUpdateInfo()"
              />
          <app-input
              [nameInput]="'last_name'"
              [(inputValue)]="userInfoEdit().last_name"
              [iconNameLeft]="''"
              [isReadOnly]="readOrWithEdit()"
              [labelText]="'Last Name'"
              [placeholderText]="'Last Name'"
              (outWant2Run)="clickedUpdateInfo()"
              />
          <app-input
              [nameInput]="'email'"
              [(inputValue)]="userInfoEdit().email"
              [iconNameLeft]="''"
              [isReadOnly]="readOrWithEdit()"
              [labelText]="'Email'"
              [placeholderText]="'Email'"
              (outWant2Run)="clickedUpdateInfo()"
              />
          <app-input
              [nameInput]="'username'"
              [(inputValue)]="userInfoEdit().username"
              [iconNameLeft]="''"
              [isReadOnly]="readOrWithEdit()"
              [labelText]="'Username'"
              [placeholderText]="'Username'"
              (outWant2Run)="clickedUpdateInfo()"
              />
          @if(readOrWithEdit()==profileReadOrAndEdit()[0]){
          <app-button
              [text]="'Edit'"
              [styleButton]="'style-solid'"
              [iconname]="'pen'"
              (outOnClick)="clickedEdit()"
              />
          }@else{
          <div class="flex-row-space-between">
            <app-button
                [text]="'Update Info'"
                [styleButton]="'style-outline'"
                [iconname]="'check'"
                (outOnClick)="clickedUpdateInfo()"
                />
            <app-button
                [text]="'Cancel'"
                [styleButton]="'style-solid'"
                [iconname]="''"
                (outOnClick)="clickedCancelEdit()"
                />
          </div>
          }
        </div>
      </div>


      <div class="flex-start-row-4px-gap">
        <span class="
          font-color-pc1-300
          font-normal-regular
          ">
          Is Access Acount
        </span>
        <app-button
           [text]="'Deactivated'"
           [styleButton]="'style-outline'"
           [iconname]="''"
           (outOnClick)="toggleAccessAccount()"
           />
      </div>


      <div class="flex-start-row-4px-gap">
        <span class="
          font-color-fail
          font-normal-regular
          ">
          DANGER
        </span>
        <app-button
           [text]="'DELETE Account'"
           [styleButton]="'style-danger-solid'"
           [iconname]="'delete'"
           (outOnClick)="clickedDELETEAccount()"
           />
      </div>
    </form>
  </div>
</div>
