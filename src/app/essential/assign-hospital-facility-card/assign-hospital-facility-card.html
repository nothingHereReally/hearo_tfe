<div class="
assign-hospital-facility-card-container
shadown-and-blur
border-radius
padding-left-right-pad200-xs
padding-top-bottom-pad200-xs
">
  <div class="
  flex-column
  gap-pad200-xl
  ">
    <div class="
    flex-row
    flex-justify-center
    ">
      <h2 class="
      font-bold-title
      font-color-pc1-300
      ">Select Hospital Facility</h2>
    </div>

    <app-input
      [nameInput]="'searchHospital'"
      [placeholderText]="'Search Hospital Name or Address'"
      [hasSearch]="'search'"
      [(inputValue)]="searchText"
      (outWant2Run)="search()"
    />

    <div class="
    flex-row
    flex-justify-center
    flex-align-center
    font-normal-regular
    font-color-fail
    "><span>
    {{ warning() }}
    </span></div>

    <div class="hospital-list-container">
      <table class="
      stats-in-table-styles
      hospital-table-selection
      ">
        <thead>
          <tr>
            <th><div class="
            font-color-pc1-300
            font-bold-regular
            padding-top-bottom-pad100-xs
            ">Hospital Name</div></th>
            <th><div class="
            font-color-pc1-300
            font-bold-regular
            padding-top-bottom-pad100-xs
            ">Address</div></th>
          </tr>
        </thead>
        <tbody>
          @for (hospital of facilities(); track hospital.id) {
            <tr
            (click)="selectFacility(hospital.id)"
            [class.selected-row]="selectedFacilityId() === hospital.id">
              <td>
                <div class="
                font-color-sc-100
                font-normal-regular
                padding-left-right-pad100-lg
                padding-top-bottom-pad100-lg
                "
                     [class.border-radius]="selectedFacilityId() === hospital.id">
                  {{ hospital.name }}
                </div>
              </td>
              <td>
                <div class="
                font-color-sc-100
                font-normal-regular
                padding-left-right-pad100-lg
                padding-top-bottom-pad100-lg
                "
                     [class.border-radius]="selectedFacilityId() === hospital.id">
                  {{ hospital.street }} {{ hospital.municipality }}
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="
    flex-row
    gap-pad200-xl
    flex-justify-center
    flex-align-center
    ">
      <app-button
          [text]="''"
          [styleButton]="'style-outline'"
          [iconname]="'arrow_left'"
          (outOnClick)="prev()"
          />
      <span class="
      font-normal-regular
      font-color-sc-100
      ">{{ pageCurrentWhat() }}/{{ pageTotalWhat() }}</span>
      <app-button
          [text]="''"
          [styleButton]="'style-outline'"
          [iconname]="'arrow_right'"
          (outOnClick)="next()"
          />
    </div>

    <div class="
    flex-row
    flex-justify-space-between
    ">
      <app-button
          [text]="'Cancel'"
          [styleButton]="'style-outline'"
          (outOnClick)="cancel()"
          />
      <app-button
          [text]="'Assign Hospital Facility'"
          [styleButton]="'style-solid'"
          (outOnClick)="assign()"
          />
    </div>
  </div>
</div>
