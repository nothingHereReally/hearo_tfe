<header class="whole-header">
  <div class="upper-header">
    <a routerLink="/home/sentence" class="bg-transparent-no-border-padding-margin">
      <img
          src="/favicon.svg"
          alt="logo icon"
          class="logo-height-48px"
          >
    </a>




    <div class="border-24r-1w-pc1-300color bg-transparent-no-padding-margin">
      <app-button
          [text]="'Home'"
          [styleButton]="homeStyle()"
          [iconname]="'home'"
          (outOnClick)="clickHome()"
          />
      <app-button
          [text]="'Hospital Head'"
          [styleButton]="hospitalHeadStyle()"
          [iconname]="'plus'"
          (outOnClick)="clickHospitalHead()"
          />
      <app-button
          [text]="'Hospitals'"
          [styleButton]="hospitalsStyle()"
          [iconname]="'hospital_location'"
          (outOnClick)="clickHospitals()"
          />
      <app-button
          [text]="'Model'"
          [styleButton]="modelStyle()"
          [iconname]="'new'"
          (outOnClick)="clickModel()"
          />
    </div>




    <div class="bg-transparent-no-border-padding-margin">
      <app-button
          [text]="''"
          [styleButton]="'style-naked'"
          [iconname]="'logout'"
          (outOnClick)="logoutAsync()"
          />


      <button class="
        bg-transparent-no-border-padding-margin
        "
        (click)="clickedProfile()">
        <img
            [src]="apiFile.cachedProfilePicture()"
            alt="User profile picture"
            class="profile-up-right radius-50p-be-round"
        >
        <span class="
          font-normal-regular
          font-color-pc1-300
          ">
          {{ authUser.cachedHearoUser().user?.first_name }} {{ authUser.cachedHearoUser().user?.last_name }}
        </span>
      </button>
    </div>
  </div>








  @if( lowerHeaderWhat()!='' ){
  <div class="lower-header border-24r-1w-pc1-300color">
    <app-button
        [text]="lowerHeaderButton()[0]"
        [styleButton]="lowerHeaderStyle()[0]"
        [iconname]="''"
        (outOnClick)="clickLowerHeader_1st_button()"
        />
    <app-button
        [text]="lowerHeaderButton()[1]"
        [styleButton]="lowerHeaderStyle()[1]"
        [iconname]="''"
        (outOnClick)="clickLowerHeader_2nd_button()"
        />
    <app-button
        [text]="lowerHeaderButton()[2]"
        [styleButton]="lowerHeaderStyle()[2]"
        [iconname]="''"
        (outOnClick)="clickLowerHeader_3rd_button()"
        />
  </div>
  }








  @if(  ( authUser.cachedHearoUser().email_verified ?? true )==false  ){
  <div class="
    font-color-fail
    font-bold-uline-title
    ">
    Please verify your Email. We sent a message to your Email.
  </div>
  }
</header>
